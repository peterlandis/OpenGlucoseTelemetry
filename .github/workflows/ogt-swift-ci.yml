name: OGT Swift runtime

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  swift-pm:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build and test Swift Package
        run: |
          cd runtimes/swift
          swift build
          swift test

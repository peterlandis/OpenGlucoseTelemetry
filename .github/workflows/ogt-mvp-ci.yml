name: OGT MVP CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Version comes from package.json "packageManager" (Corepack-compatible pin).
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml
      - name: Install, build, test, smoke pipeline
        run: |
          pnpm install --frozen-lockfile
          pnpm verify
